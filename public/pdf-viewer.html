<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>PDF Viewer - NERIST Hub</title>
    <link rel="icon" href="feviconicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Navbar for viewer */
        .viewer-navbar {
            background: var(--bg-nav);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }
        
        .viewer-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .viewer-brand .logo-icon {
            font-size: 24px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .viewer-brand span {
            font-weight: 700;
            font-size: 18px;
            color: var(--accent-primary);
        }
        
        .viewer-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            max-width: 50%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .viewer-title i {
            color: var(--accent-primary);
        }
        
        .viewer-actions {
            display: flex;
            gap: 12px;
        }
        
        .viewer-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            border: none;
        }
        
        .viewer-btn-primary {
            background: var(--gradient-primary);
            color: white;
        }
        
        .viewer-btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .viewer-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .viewer-btn i {
            font-size: 14px;
        }
        
        /* PDF Container */
        #pdf-container {
            flex: 1;
            width: 100%;
            background: var(--bg-secondary);
            position: relative;
            overflow: hidden;
        }
        
        #pdf-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(var(--bg-card-rgb), 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Error State */
        .error-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .error-state i {
            font-size: 64px;
            color: var(--accent-danger);
            margin-bottom: 20px;
        }
        
        .error-state h3 {
            margin-bottom: 10px;
            color: var(--text-primary);
        }
        
        .error-state p {
            margin-bottom: 20px;
        }
        
        .error-state .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--gradient-primary);
            color: white;
            text-decoration: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .viewer-navbar {
                padding: 10px 16px;
                flex-wrap: wrap;
            }
            
            .viewer-title {
                order: 3;
                max-width: 100%;
                width: 100%;
                margin-top: 8px;
                justify-content: center;
            }
            
            .viewer-actions {
                gap: 8px;
            }
            
            .viewer-btn {
                padding: 8px 12px;
                font-size: 13px;
            }
            
            .viewer-btn span {
                display: none;
            }
            
            .viewer-btn i {
                font-size: 16px;
                margin: 0;
            }
        }

        @media (max-width: 480px) {
            .viewer-navbar {
                padding: 8px 12px;
            }
            
            .viewer-brand .logo-icon {
                font-size: 20px;
            }
            
            .viewer-brand span {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <div class="viewer-navbar">
        <div class="viewer-brand">
            <span class="logo-icon">🧑‍🎓</span>
            <span>NERIST Hub</span>
        </div>
        
        <div class="viewer-title" id="pdf-title">
            <i class="fas fa-file-pdf"></i>
            <span>Loading PDF...</span>
        </div>
        
        <div class="viewer-actions">
            <a href="#" id="download-btn" class="viewer-btn viewer-btn-primary" download>
                <!-- <i class="fas fa-download"></i>
                <span>Download</span> -->
            </a>
           
        </div>
    </div>
    
    <!-- PDF Container -->
    <div id="pdf-container">
        <div class="loading-overlay" id="loading">
            <div class="spinner"></div>
            <p>Loading PDF...</p>
        </div>
        
        <iframe id="pdf-frame" src="" allowfullscreen></iframe>
        
        <div id="error-message" class="error-state" style="display: none;">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Failed to Load PDF</h3>
            <p>The PDF could not be loaded. Please try downloading it instead.</p>
            <a href="#" id="error-download" class="btn">
                <i class="fas fa-download"></i> Download PDF
            </a>
        </div>
    </div>

    <script>
        // Get PDF URL from query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const pdfUrl = urlParams.get('file');
        const pdfName = urlParams.get('name') || 'Question Paper';
        
        const pdfFrame = document.getElementById('pdf-frame');
        const loadingEl = document.getElementById('loading');
        const errorEl = document.getElementById('error-message');
        const titleEl = document.getElementById('pdf-title').querySelector('span');
        const downloadBtn = document.getElementById('download-btn');
        const errorDownload = document.getElementById('error-download');
        
        // Update title
        titleEl.textContent = pdfName;
        
        if (pdfUrl) {
            // Decode the URL
            const decodedUrl = decodeURIComponent(pdfUrl);
            
            // Set download link
            downloadBtn.href = decodedUrl;
            errorDownload.href = decodedUrl;
            
            // Use Google Docs Viewer for better PDF rendering
            const viewerUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(decodedUrl)}&embedded=true`;
            
            // Set iframe source
            pdfFrame.src = viewerUrl;
            
            // Hide loading when iframe loads
            pdfFrame.onload = function() {
                loadingEl.style.display = 'none';
            };
            
            // Handle errors
            pdfFrame.onerror = function() {
                loadingEl.style.display = 'none';
                errorEl.style.display = 'block';
            };
            
            // Timeout fallback (if iframe doesn't load within 10 seconds)
            setTimeout(function() {
                if (loadingEl.style.display !== 'none') {
                    loadingEl.style.display = 'none';
                    errorEl.style.display = 'block';
                }
            }, 10000);
            
        } else {
            // No PDF URL provided
            loadingEl.style.display = 'none';
            errorEl.style.display = 'block';
            errorEl.querySelector('h3').textContent = 'No PDF Specified';
            errorEl.querySelector('p').textContent = 'Please provide a PDF file to view.';
            document.getElementById('error-download').style.display = 'none';
        }
        
        // Handle back button
        document.querySelector('a[href="javascript:history.back()"]').addEventListener('click', function(e) {
            e.preventDefault();
            history.back();
        });
    </script>
</body>
</html>
